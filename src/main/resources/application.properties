spring.application.name=karaokebooking

# Cấu hình Database thông minh: Ưu tiên lấy từ biến môi trường, nếu không có thì dùng localhost
server.port=${PORT:8080}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/karaoke_booking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456789}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

# Giữ nguyên cấu hình JWT của bạn
dungmount.jwt.base64-secret=qoAEABDke07+AVLepXB4aCMtsT0wMAqR5x2VFyldsnx6e75YQkJH2UcZKTjEyoNgG71SBCXfq5N6NVZxWOfsHQ==
dungmount.jwt.access-token-validity-in-seconds=8640000
dungmount.jwt.refresh-token-validity-in-seconds=8640000